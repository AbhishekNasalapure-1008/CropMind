<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none" width="36" height="36">
  <defs>
    <linearGradient id="leafGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#A3E635;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Main leaf shape -->
  <path
    d="M24 6 C18 6 8 12 7 24 C6 32 10 40 18 43 C16 36 18 30 24 26 C30 30 32 36 30 43 C38 40 42 32 41 24 C40 12 30 6 24 6Z"
    fill="url(#leafGrad)"
    filter="url(#glow)"
  />
  <!-- Central vein -->
  <path
    d="M24 10 L24 42"
    stroke="#0A0F0A"
    stroke-width="1.5"
    stroke-linecap="round"
    opacity="0.6"
  />
  <!-- Left veins -->
  <path d="M24 20 L15 16" stroke="#0A0F0A" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M24 27 L13 24" stroke="#0A0F0A" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M24 34 L16 32" stroke="#0A0F0A" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <!-- Right veins -->
  <path d="M24 20 L33 16" stroke="#0A0F0A" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M24 27 L35 24" stroke="#0A0F0A" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <path d="M24 34 L32 32" stroke="#0A0F0A" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/>
  <!-- Stem -->
  <path
    d="M24 43 C24 43 22 46 20 47"
    stroke="url(#leafGrad)"
    stroke-width="2"
    stroke-linecap="round"
    fill="none"
  />
</svg>
